<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZiOS 1.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="phone">
        <div class="status-bar">
            <span id="stat-time">13:02</span>
            <span>ZiOS v1.0 🔋</span>
        </div>
        
        <div id="lock-screen">
            <h1 id="clock">00:00</h1>
            <p id="date">Tuesday, May 12</p>
            
            <div class="fingerprint-area" onclick="unlock()">
                <div class="fingerprint">🧬</div>
                <p style="font-size: 12px; margin-top: 10px;">Açmaq üçün toxun</p>
            </div>
        </div>

        <div id="home-screen">
            <div class="app">
                <div class="app-icon">⚙️</div>
                <span>Settings</span>
            </div>
            <div class="app">
                <div class="app-icon">📞</div>
                <span>Phone</span>
            </div>
            <div class="app">
                <div class="app-icon">💬</div>
                <span>Messages</span>
            </div>
            <div class="app">
                <div class="app-icon">🌐</div>
                <span>Browser</span>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
